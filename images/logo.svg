<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 60" width="340" height="60">
  <defs>
    <style>
      .logo-wordmark { font-family: 'Josefin Sans', 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif; }
    </style>
  </defs>
  <!-- Ship icon -->
  <g transform="translate(0, 4)">
    <!-- Hull -->
    <path d="M4 34 L6 26 L22 26 L24 34 Z" fill="#E8F4F8"/>
    <path d="M3 34 L25 34 L23 38 L5 38 Z" fill="#E8F4F8"/>
    <!-- Superstructure -->
    <rect x="9" y="20" width="10" height="6" rx="1" fill="white"/>
    <!-- Funnel -->
    <rect x="13" y="13" width="3" height="8" rx="0.5" fill="#E8500A"/>
    <!-- Wave line -->
    <path d="M1 40 Q5 38 9 40 Q13 42 17 40 Q21 38 25 40" stroke="#E8F4F8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- "SMALL SHIP" -->
  <text x="34" y="28" class="logo-wordmark" font-size="20" font-weight="700" fill="white" letter-spacing="3">SMALL SHIP</text>
  <!-- "ANTARCTICA CRUISES" -->
  <text x="34" y="48" class="logo-wordmark" font-size="12" font-weight="400" fill="#A8C8E0" letter-spacing="2.5">ANTARCTICA CRUISES</text>
</svg>
